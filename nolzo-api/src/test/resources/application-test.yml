spring:
  config.activate.on-profile: "test"
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: test-seat-available-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.noljo.nolzo.notification.adapter.out.event
    listener:
      auto-startup: false
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:nolzo;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

security:
  jwt:
    secret-key: "alfknmeanfgaeownfewalf.afklneaflneaiofnaeoifnewanfea.afofineaoifnanfeakngalneg"
    expire-length: 36000

app:
  kafka:
    consumer:
      enabled: false
      group-id: test-seat-available-group
    topics:
      seat-available: seat-available-events
      notification-batch-request: notification-batch-requests
  notification:
    batch-size: 2
    cooldown-minutes: 10
    retry-attempts: 3
