spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 10
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
        spring.json.add.type.headers: false
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:seat-available-notification-group}
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.noljo.nolzo.notification.adapter.message
    listener:
      missing-topics-fatal: false

app:
  kafka:
    admin:
      enabled: true
    consumer:
      enabled: false
      group-id: seat-available-notification-group
    topics:
      seat-available: seat-available-events
      notification-batch-request: notification-batch-requests
      dlt:
        seat-available: seat-available-events-dlt
        notification-batch-request: notification-batch-requests-dlt
    topic:
      partitions:
        seat-available: 1
        notification-batch-request: 1
        dlt: 1
      replicas:
        seat-available: 1
        notification-batch-request: 1
        dlt: 1
    error:
      retry-attempts: 3
      initial-interval-ms: 1000
      multiplier: 2.0
      max-interval-ms: 10000
  notification:
    batch-size: 100
    cooldown-minutes: 10
    retry-attempts: 3
  outbox:
    publish:
      batch-size: 100
      fixed-delay-ms: 3000
