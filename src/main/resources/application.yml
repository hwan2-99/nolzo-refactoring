server:
  port: 8080
  servlet:
    context-path: /api/${api.version}
  name: nolzo
  forward-headers-strategy: framework
  tomcat:
    mbeanregistry:
      enabled: true
    threads:
      max: 400
      min-spare: 20
    max-connections: 10000
    accept-count: 200
    connection-timeout: 20000

api:
  version: v1

spring:
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  config:
    import: optional:file:./.env[.properties]
  datasource:
    url: jdbc:mysql://mysql:3306/nolzo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: root
    password: rlaxoghks12
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000
  task:
    execution:
      pool:
        core-size: 20
        max-size: 100
        queue-capacity: 200
        keep-alive: 60s
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 500
        format_sql: true
        use_sql_comments: true
    open-in-view: false
    show-sql: true

# JWT 설정
jwt:
  secret: "qwepoiasdkljzxcmaskldjnowjgnhwqaknfjoasddnflkasjdlkasjl"
  access-token-validity-in-seconds: 900
  refresh-token-validity-in-seconds: 1209600

# CORS 설정
cors:
  allowed-origins: http://localhost:3000/
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: '*'
  max-age: 3600

# Swagger 설정
swagger:
  server:
    url: ${SWAGGER_SERVER_URL:http://localhost:8080/api/v1}

#AWS S3 관련 설정
cloud:
  aws:
    s3:
      bucketName: nolzobucket
    credentials:
      access-key: AKIASXKDVEY2X66TGXW7
      secret-key: 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
    region:
      static: ap-northeast-2
    stack:
      auto: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  server:
    port: 8080
  metrics:
    tags:
      application: nolzo-app
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 500ms, 1500ms
  prometheus:
    metrics:
      export:
        enabled: true
